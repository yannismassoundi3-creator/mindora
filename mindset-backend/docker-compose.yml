version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mindset_postgres
    environment:
      POSTGRES_USER: mindset_admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: mindset_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mindset_network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: mindset_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - mindset_network
    restart: always

volumes:
  postgres_data:
  redis_data:

networks:
  mindset_network:
    driver: bridge
